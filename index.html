<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard Comercial</title>

<style>
body{
  background:#0f172a;
  color:#e5e7eb;
  font-family:Arial;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:10px;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  background:rgba(255,255,255,0.1);
  border:none;
  color:white;
  border-radius:6px;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  background:#22c55e;
  color:black;
  border-radius:6px;
  cursor:pointer;
}

.progress{
  background:#1f2937;
  height:10px;
  border-radius:10px;
  margin-top:10px;
}

.bar{
  height:10px;
  background:#22c55e;
  width:0%;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>Dashboard Comercial</h2>

<div class="grid">
  <div class="card">
    <b>Meta</b><br>
    <span id="meta">R$ 7.000,00</span>
  </div>

  <div class="card">
    <b>Guilherme</b><br>
    <span id="guilherme">R$ 0,00</span>
  </div>

  <div class="card">
    <b>MED</b><br>
    <span id="med">R$ 0,00</span>
  </div>

  <div class="card">
    <b>ECOS</b><br>
    <span id="ecos">R$ 0,00</span>
  </div>
</div>

<br>

<div class="card">

Guilherme
<input id="inputG" value="0,00">

MED
<input id="inputM" value="0,00">

ECOS
<input id="inputE" value="0,00">

<button onclick="calcular()">Atualizar</button>

<div class="progress">
  <div class="bar" id="barra"></div>
</div>

<br>
<div id="resultado"></div>

</div>

<script>
const META = 7000;

// máscara banco
function mascara(input){
  input.addEventListener('input',function(){
    let v = input.value.replace(/\D/g,'');

    if(!v){
      input.value='';
      return;
    }

    v = (v/100).toFixed(2);
    v = v.replace('.',',');
    v = v.replace(/\B(?=(\d{3})+(?!\d))/g,'.');

    input.value = v;
  });
}

// limpar número
function limpar(v){
  return Number(v.replace(/\./g,'').replace(',','.')) || 0;
}

// moeda
function moeda(v){
  return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

// cálculo
function calcular(){

  let g = limpar(document.getElementById('inputG').value);
  let m = limpar(document.getElementById('inputM').value);
  let e = limpar(document.getElementById('inputE').value);

  let bonus = (m + e) * 0.15;
  let total = g + bonus;

  let falta = META - total;
  if(falta < 0) falta = 0;

  let pct = (total / META) * 100;

  document.getElementById('guilherme').innerText = moeda(g);
  document.getElementById('med').innerText = moeda(m);
  document.getElementById('ecos').innerText = moeda(e);

  document.getElementById('barra').style.width = pct + "%";

  document.getElementById('resultado').innerHTML =
    "Total: <b>"+moeda(total)+"</b><br>"+
    "Falta: <b>"+moeda(falta)+"</b>";
}

// ativar máscaras
mascara(document.getElementById('inputG'));
mascara(document.getElementById('inputM'));
mascara(document.getElementById('inputE'));
</script>

</body>
</html>
