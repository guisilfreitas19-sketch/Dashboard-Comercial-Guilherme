<script>
const STORAGE_KEY = 'dashboardComercialGuilherme';

const estadoInicial = {
  totalGuilherme: 0,
  totalMed: 0,
  totalEcos: 0,
  metaObservacao: ''
};

let estado = { ...estadoInicial };

function formatarMoeda(valor) {
  return Number(valor || 0).toLocaleString('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  });
}

// 🔥 limpa valor formatado (ex: 1.250,50 → 1250.50)
function limparNumero(valor) {
  return Number(
    valor.replace(/\./g, '').replace(',', '.')
  ) || 0;
}

// 🔥 máscara tipo app de banco
function aplicarMascaraMoeda(input) {
  input.addEventListener('input', function (e) {
    let valor = e.target.value.replace(/\D/g, '');

    valor = (Number(valor) / 100).toFixed(2);

    valor = valor.replace('.', ',');
    valor = valor.replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1.');

    e.target.value = valor;
  });
}

// 🔥 aplica nos campos certos
function inicializarMascaras() {
  ['totalGuilherme', 'totalMed', 'totalEcos'].forEach(id => {
    const el = document.getElementById(id);
    if (el) aplicarMascaraMoeda(el);
  });
}

function lerCamposPainel() {
  estado.totalGuilherme = limparNumero(document.getElementById('totalGuilherme').value || '0');
  estado.totalMed = limparNumero(document.getElementById('totalMed').value || '0');
  estado.totalEcos = limparNumero(document.getElementById('totalEcos').value || '0');
  estado.metaObservacao = document.getElementById('metaObservacao').value || '';
}

function preencherCamposPainel() {
  document.getElementById('totalGuilherme').value = formatarMoeda(estado.totalGuilherme).replace('R$', '').trim();
  document.getElementById('totalMed').value = formatarMoeda(estado.totalMed).replace('R$', '').trim();
  document.getElementById('totalEcos').value = formatarMoeda(estado.totalEcos).replace('R$', '').trim();
  document.getElementById('metaObservacao').value = estado.metaObservacao || '';
}

// 🔥 regra REAL do seu negócio
function calcularBaseMeta() {
  const baseEquipe = estado.totalMed + estado.totalEcos;
  const bonus = baseEquipe * 0.15;
  const total = estado.totalGuilherme + bonus;
  const falta = Math.max(7000 - total, 0);
  const percentual = (total / 7000) * 100;

  return { bonus, total, falta, percentual };
}

function atualizarPainel() {
  lerCamposPainel();
  renderizar();
}

function renderizar() {
  const { bonus, total, falta, percentual } = calcularBaseMeta();

  document.getElementById('metaPessoalView').textContent = formatarMoeda(7000);
  document.getElementById('totalGuilhermeView').textContent = formatarMoeda(estado.totalGuilherme);
  document.getElementById('totalMedView').textContent = formatarMoeda(estado.totalMed);
  document.getElementById('totalEcosView').textContent = formatarMoeda(estado.totalEcos);

  document.getElementById('barraMeta').style.width = `${Math.min(percentual, 100)}%`;
  document.getElementById('textoMeta').textContent = `${percentual.toFixed(1)}% da meta atingida`;

  document.getElementById('resumoMeta').innerHTML = `
    Vendas próprias: <b>${formatarMoeda(estado.totalGuilherme)}</b><br>
    Bônus (15% MED + ECOS): <b>${formatarMoeda(bonus)}</b><br>
    Total considerado: <b>${formatarMoeda(total)}</b><br>
    Falta: <b>${formatarMoeda(falta)}</b>
  `;

  document.getElementById('statusResumo').textContent =
    falta <= 0 ? 'Meta batida' : `Faltam ${formatarMoeda(falta)}`;
}

function salvarDados() {
  lerCamposPainel();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(estado));
  renderizar();
}

function carregarDados() {
  const salvo = localStorage.getItem(STORAGE_KEY);
  estado = salvo ? JSON.parse(salvo) : { ...estadoInicial };

  preencherCamposPainel();
  renderizar();
}

document.addEventListener('DOMContentLoaded', () => {
  inicializarMascaras();
  carregarDados();
});
</script>
