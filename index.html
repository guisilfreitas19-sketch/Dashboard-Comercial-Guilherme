<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard Comercial</title>

<style>
:root{
  --bg:#0b1220;
  --card:#111827;
  --card-2:#0f172a;
  --border:rgba(255,255,255,.06);
  --text:#e5e7eb;
  --muted:#94a3b8;
  --primary:#22c55e;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Inter, Arial;
}

body{
  background:linear-gradient(135deg,#0b1220,#0f172a);
  color:var(--text);
  padding:30px;
}

.container{
  max-width:1100px;
  margin:auto;
}

h1{
  margin-bottom:20px;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
}

.kpi-label{
  color:var(--muted);
  font-size:.85rem;
}

.kpi-value{
  font-size:1.6rem;
  font-weight:bold;
  margin-top:4px;
}

/* BLOCO PRINCIPAL */
.main{
  margin-top:20px;
  background:var(--card-2);
  padding:22px;
  border-radius:18px;
  border:1px solid var(--border);
}

/* INPUTS */
.field{
  margin-bottom:16px;
}

label{
  display:block;
  margin-bottom:6px;
  color:var(--muted);
  font-size:.9rem;
}

.input-wrap{
  display:flex;
  align-items:center;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
}

.prefix{
  margin-right:6px;
  color:var(--muted);
}

input{
  background:transparent;
  border:none;
  outline:none;
  color:var(--text);
  font-size:1rem;
  width:100%;
}

/* BOTÃO */
button{
  margin-top:10px;
  padding:12px 18px;
  border:none;
  background:var(--primary);
  color:#052e16;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

/* PROGRESSO */
.progress{
  margin-top:16px;
  height:10px;
  background:#1f2937;
  border-radius:10px;
}

.bar{
  height:10px;
  width:0%;
  background:var(--primary);
  border-radius:10px;
}

/* RESULTADO */
.result{
  margin-top:16px;
  line-height:1.6;
  font-size:.95rem;
}

/* RESPONSIVO */
@media(max-width:900px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>Dashboard Comercial</h1>

<div class="grid">
  <div class="card">
    <div class="kpi-label">Meta</div>
    <div class="kpi-value" id="meta">R$ 7.000,00</div>
  </div>

  <div class="card">
    <div class="kpi-label">Guilherme</div>
    <div class="kpi-value" id="guilherme">R$ 0,00</div>
  </div>

  <div class="card">
    <div class="kpi-label">MED</div>
    <div class="kpi-value" id="med">R$ 0,00</div>
  </div>

  <div class="card">
    <div class="kpi-label">ECOS</div>
    <div class="kpi-value" id="ecos">R$ 0,00</div>
  </div>
</div>

<div class="main">

<div class="field">
  <label>Guilherme</label>
  <div class="input-wrap">
    <span class="prefix">R$</span>
    <input id="g" value="0,00">
  </div>
</div>

<div class="field">
  <label>MED</label>
  <div class="input-wrap">
    <span class="prefix">R$</span>
    <input id="m" value="0,00">
  </div>
</div>

<div class="field">
  <label>ECOS</label>
  <div class="input-wrap">
    <span class="prefix">R$</span>
    <input id="e" value="0,00">
  </div>
</div>

<button onclick="calc()">Atualizar</button>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<div class="result" id="res"></div>

</div>

</div>

<script>
const META = 7000;

function moeda(v){
  return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

function limpar(v){
  return Number(v.replace(/\./g,'').replace(',','.'))||0;
}

function mask(input){
  input.addEventListener('input',()=>{
    let v = input.value.replace(/\D/g,'');

    if(!v){
      input.value='';
      return;
    }

    v=(v/100).toFixed(2);
    v=v.replace('.',',');
    v=v.replace(/\B(?=(\d{3})+(?!\d))/g,'.');

    input.value=v;
  })
}

function calc(){
  let g=limpar(document.getElementById('g').value);
  let m=limpar(document.getElementById('m').value);
  let e=limpar(document.getElementById('e').value);

  let bonus=(m+e)*0.15;
  let total=g+bonus;
  let falta=Math.max(META-total,0);
  let pct=(total/META)*100;

  document.getElementById('guilherme').innerText=moeda(g);
  document.getElementById('med').innerText=moeda(m);
  document.getElementById('ecos').innerText=moeda(e);

  document.getElementById('bar').style.width=pct+"%";

  document.getElementById('res').innerHTML =
    `Total: <b>${moeda(total)}</b><br>
     Falta: <b>${moeda(falta)}</b>`;
}

mask(document.getElementById('g'));
mask(document.getElementById('m'));
mask(document.getElementById('e'));
</script>

</body>
</html>
