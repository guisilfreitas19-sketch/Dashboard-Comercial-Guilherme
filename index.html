<script>
const STORAGE_KEY = 'dashboardComercialGuilherme';

const estadoInicial = {
  metaPessoal: 7000,
  participacaoMed: 15,
  totalGuilherme: 0,
  totalMed: 0,
  totalEcos: 0,
  metaObservacao: ''
};

let estado = { ...estadoInicial };

function formatarMoeda(valor) {
  return Number(valor || 0).toLocaleString('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  });
}

// 🔥 limpa valor formatado (1.250,50 → 1250.50)
function limparNumero(valor) {
  if (!valor) return 0;
  return Number(valor.replace(/\./g, '').replace(',', '.')) || 0;
}

// 🔥 máscara tipo banco
function mascaraMoeda(campo) {
  campo.addEventListener('input', function () {
    let valor = campo.value.replace(/\D/g, '');

    if (!valor) {
      campo.value = '';
      return;
    }

    valor = (parseInt(valor) / 100).toFixed(2);
    valor = valor.replace('.', ',');
    valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, '.');

    campo.value = valor;
  });
}

// ativa máscara
function ativarMascaras() {
  mascaraMoeda(document.getElementById('totalGuilherme'));
  mascaraMoeda(document.getElementById('totalMed'));
  mascaraMoeda(document.getElementById('totalEcos'));
}

function lerCamposPainel() {
  estado.totalGuilherme = limparNumero(document.getElementById('totalGuilherme').value);
  estado.totalMed = limparNumero(document.getElementById('totalMed').value);
  estado.totalEcos = limparNumero(document.getElementById('totalEcos').value);
  estado.metaObservacao = document.getElementById('metaObservacao').value || '';
}

function preencherCamposPainel() {
  document.getElementById('metaPessoal').value = estado.metaPessoal;
  document.getElementById('participacaoMed').value = estado.participacaoMed;

  document.getElementById('totalGuilherme').value = estado.totalGuilherme.toLocaleString('pt-BR', {minimumFractionDigits:2});
  document.getElementById('totalMed').value = estado.totalMed.toLocaleString('pt-BR', {minimumFractionDigits:2});
  document.getElementById('totalEcos').value = estado.totalEcos.toLocaleString('pt-BR', {minimumFractionDigits:2});

  document.getElementById('metaObservacao').value = estado.metaObservacao || '';
}

// 🔥 regra real
function calcularBaseMeta() {
  const baseEquipe = estado.totalMed + estado.totalEcos;
  const bonus = baseEquipe * 0.15;
  const total = estado.totalGuilherme + bonus;
  const falta = Math.max(estado.metaPessoal - total, 0);
  const percentual = (total / estado.metaPessoal) * 100;

  return { bonus, total, falta, percentual };
}

function atualizarPainel() {
  lerCamposPainel();
  renderizarTudo();
}

function renderizarTudo() {
  const { bonus, total, falta, percentual } = calcularBaseMeta();

  document.getElementById('metaPessoalView').textContent = formatarMoeda(estado.metaPessoal);
  document.getElementById('totalGuilhermeView').textContent = formatarMoeda(estado.totalGuilherme);
  document.getElementById('totalMedView').textContent = formatarMoeda(estado.totalMed);
  document.getElementById('totalEcosView').textContent = formatarMoeda(estado.totalEcos);

  document.getElementById('barraMeta').style.width = Math.min(percentual, 100) + "%";
  document.getElementById('textoMeta').textContent = percentual.toFixed(1) + "% da meta atingida";

  document.getElementById('resumoMeta').innerHTML = `
    <strong>Resumo:</strong><br>
    Vendas: <b>${formatarMoeda(estado.totalGuilherme)}</b><br>
    Bônus 15%: <b>${formatarMoeda(bonus)}</b><br>
    Total: <b>${formatarMoeda(total)}</b><br>
    Falta: <b>${formatarMoeda(falta)}</b>
  `;

  document.getElementById('statusResumo').textContent =
    falta <= 0 ? "Meta batida" : "Faltam " + formatarMoeda(falta);
}

function salvarDados() {
  lerCamposPainel();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(estado));
  renderizarTudo();
}

function carregarDados() {
  const salvo = localStorage.getItem(STORAGE_KEY);
  estado = salvo ? { ...estadoInicial, ...JSON.parse(salvo) } : { ...estadoInicial };

  preencherCamposPainel();
  renderizarTudo();
}

document.addEventListener('DOMContentLoaded', () => {
  ativarMascaras();
  carregarDados();
});
</script>
