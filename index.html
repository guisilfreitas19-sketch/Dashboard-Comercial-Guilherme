<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consolidado de Bancas 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-gray-200 p-4 md:p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 mb-8 shadow-2xl">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="text-center md:text-left">
                    <h1 class="text-xs font-bold text-gray-500 uppercase tracking-[0.3em] mb-1">Performance Global</h1>
                    <p id="totalGeral" class="text-4xl font-mono font-bold text-white">R$ 0,00</p>
                </div>
                
                <div class="flex gap-8 border-l border-gray-800 pl-8">
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase font-bold">Lucro Total</p>
                        <p id="lucroGeral" class="text-2xl font-mono text-green-400">R$ 0,00</p>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase font-bold">ROI Geral</p>
                        <p id="roiGeral" class="text-2xl font-mono text-green-400">0%</p>
                    </div>
                </div>

                <button onclick="adicionarConta()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-lg text-xs font-bold transition-all uppercase tracking-widest">
                    + Nova Conta
                </button>
            </div>
        </div>

        <div id="gridContas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        const BANCA_TOTAL_INICIAL = 5000;
        let contas = JSON.parse(localStorage.getItem('minhasContas_v2')) || [
            { id: Date.now(), nome: 'BETANO - EVERTON', saldo: 2500 },
            { id: Date.now() + 1, nome: 'BETANO - LUIZ', saldo: 2500 }
        ];

        function salvar() {
            localStorage.setItem('minhasContas_v2', JSON.stringify(contas));
            atualizarConsolidado();
        }

        function adicionarConta() {
            const nome = prompt("Nome da Conta:");
            if (nome) {
                contas.push({ id: Date.now(), nome: nome.toUpperCase(), saldo: 0 });
                salvar();
                renderizar();
            }
        }

        function removerConta(id) {
            if (confirm("Excluir esta conta?")) {
                contas = contas.filter(c => c.id !== id);
                salvar();
                renderizar();
            }
        }

        function atualizarConsolidado() {
            const totalSoma = contas.reduce((acc, c) => acc + c.saldo, 0);
            const lucroTotal = totalSoma - BANCA_TOTAL_INICIAL;
            const roiTotal = (lucroTotal / BANCA_TOTAL_INICIAL) * 100;

            document.getElementById('totalGeral').innerText = totalSoma.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            
            const lucroEl = document.getElementById('lucroGeral');
            const roiEl = document.getElementById('roiGeral');
            
            lucroEl.innerText = lucroTotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            roiEl.innerText = `${roiTotal.toFixed(2)}%`;

            const cor = lucroTotal >= 0 ? "text-green-400" : "text-red-500";
            lucroEl.className = `text-2xl font-mono ${cor}`;
            roiEl.className = `text-2xl font-mono ${cor}`;
        }

        function mascaraMoeda(event, id) {
            let v = event.target.value.replace(/\D/g, '');
            v = (v / 100).toFixed(2) + '';
            v = v.replace(".", ",");
            v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
            v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
            event.target.value = "R$ " + v;
            
            // Atualiza saldo no array
            const valorNumerico = parseFloat(v.replace(/\./g, '').replace(',', '.'));
            const index = contas.findIndex(c => c.id === id);
            contas[index].saldo = valorNumerico;
            salvar();
        }

        function renderizar() {
            const grid = document.getElementById('gridContas');
            grid.innerHTML = '';

            contas.forEach(conta => {
                const saldoFormatado = conta.saldo.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                grid.innerHTML += `
                    <div class="bg-gray-900 border border-gray-800 p-6 rounded-xl hover:border-gray-600 transition-colors relative">
                        <button onclick="removerConta(${conta.id})" class="absolute top-4 right-4 text-gray-700 hover:text-red-500">✕</button>
                        <h3 class="text-blue-400 text-[10px] font-bold uppercase tracking-widest mb-4">${conta.nome}</h3>
                        <label class="block text-[9px] text-gray-500 uppercase mb-1">Saldo em Conta</label>
                        <input type="text" 
                            value="R$ ${saldoFormatado}"
                            oninput="mascaraMoeda(event, ${conta.id})"
                            class="bg-transparent border-b border-gray-800 focus:border-blue-500 outline-none w-full text-3xl font-mono text-white pb-2 transition-all">
                    </div>
                `;
            });
            atualizarConsolidado();
        }

        renderizar();
    </script>
</body>
</html>
