<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Banca - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 p-4 font-sans">

    <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-2">
        <h1 class="text-xl font-bold uppercase tracking-wider">Gestão de Banca</h1>
        <div class="text-sm text-gray-400">Banca Inicial: <span class="text-green-400 font-mono">R$ 5.000,00</span></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="bg-gray-800 p-4 rounded shadow-sm border-l-4 border-blue-500">
            <p class="text-xs text-gray-400 uppercase">Saldo Atual</p>
            <input type="number" id="saldoAtual" oninput="calcularLucro()" placeholder="R$ 0,00" 
                class="bg-transparent text-2xl font-mono focus:outline-none w-full">
        </div>

        <div class="bg-gray-800 p-4 rounded shadow-sm border-l-4 border-green-500">
            <p class="text-xs text-gray-400 uppercase">Lucro para Retirada</p>
            <p id="lucroFinal" class="text-2xl font-mono text-green-400">R$ 0,00</p>
        </div>

        <div class="bg-gray-800 p-4 rounded shadow-sm border-l-4 border-purple-500">
            <p class="text-xs text-gray-400 uppercase">ROI Mensal</p>
            <p id="roi" class="text-2xl font-mono text-purple-400">0%</p>
        </div>
    </div>

    <div class="bg-gray-800 rounded overflow-hidden">
        <table class="w-full text-left text-sm">
            <thead class="bg-gray-700 text-gray-300 uppercase text-xs">
                <tr>
                    <th class="p-3">Data</th>
                    <th class="p-3">Evento</th>
                    <th class="p-3 text-right">Resultado</th>
                </tr>
            </thead>
            <tbody id="historicoCorpo">
                <tr class="border-b border-gray-700">
                    <td class="p-3 text-gray-400">26/03/2026</td>
                    <td class="p-3 italic">Exemplo de Entrada</td>
                    <td class="p-3 text-right text-green-400 font-mono">+ R$ 150,00</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        function calcularLucro() {
            const bancaInicial = 5000;
            const saldoAtual = document.getElementById('saldoAtual').value;
            const lucroField = document.getElementById('lucroFinal');
            const roiField = document.getElementById('roi');

            if (saldoAtual) {
                const lucro = saldoAtual - bancaInicial;
                const roi = (lucro / bancaInicial) * 100;

                lucroField.innerText = `R$ ${lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
                roiField.innerText = `${roi.toFixed(2)}%`;

                // Muda cor se estiver no prejuízo
                lucroField.className = lucro >= 0 ? "text-2xl font-mono text-green-400" : "text-2xl font-mono text-red-400";
            }
        }
    </script>
</body>
</html>
