<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Bancas 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-black text-gray-200 p-6 font-sans">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tighter text-white">DASHBOARD DE APOSTAS</h1>
                <p class="text-xs text-gray-500 uppercase tracking-widest">Gestão Multi-Contas | Banca Base: R$ 5.000,00</p>
            </div>
            <button onclick="adicionarConta()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded text-xs font-bold transition-all">
                + ADICIONAR CONTA
            </button>
        </div>

        <div id="gridContas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        let contas = JSON.parse(localStorage.getItem('minhasContas')) || [
            { id: Date.now(), nome: 'BETANO - EVERTON', saldo: 5000 }
        ];

        const BANCA_INICIAL = 5000;

        function salvar() {
            localStorage.setItem('minhasContas', JSON.stringify(contas));
        }

        function adicionarConta() {
            const nome = prompt("Nome da Conta (ex: BETANO - LUIZ):");
            if (nome) {
                contas.push({ id: Date.now(), nome: nome.toUpperCase(), saldo: 5000 });
                salvar();
                renderizar();
            }
        }

        function removerConta(id) {
            if (confirm("Deseja excluir esta conta?")) {
                contas = contas.filter(c => c.id !== id);
                salvar();
                renderizar();
            }
        }

        function atualizarSaldo(id, valorTexto) {
            const valorNumerico = parseFloat(valorTexto.replace(/\D/g, '')) / 100 || 0;
            const index = contas.findIndex(c => c.id === id);
            contas[index].saldo = valorNumerico;
            salvar();
            
            // Atualiza apenas os campos de resultado do card específico para não perder o foco do input
            const lucro = valorNumerico - BANCA_INICIAL;
            const roi = (lucro / BANCA_INICIAL) * 100;
            
            const card = document.querySelector(`[data-id="${id}"]`);
            const lucroEl = card.querySelector('.lucro-val');
            const roiEl = card.querySelector('.roi-val');
            
            lucroEl.innerText = `R$ ${lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            roiEl.innerText = `${roi.toFixed(2)}%`;
            
            const cor = lucro >= 0 ? "text-green-400" : "text-red-500";
            lucroEl.className = `lucro-val text-xl font-mono ${cor}`;
            roiEl.className = `roi-val text-xl font-mono ${cor}`;
        }

        function mascaraMoeda(event, id) {
            let v = event.target.value.replace(/\D/g, '');
            v = (v / 100).toFixed(2) + '';
            v = v.replace(".", ",");
            v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
            v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
            event.target.value = "R$ " + v;
            atualizarSaldo(id, v);
        }

        function renderizar() {
            const grid = document.getElementById('gridContas');
            grid.innerHTML = '';

            contas.forEach(conta => {
                const lucro = conta.saldo - BANCA_INICIAL;
                const roi = (lucro / BANCA_INICIAL) * 100;
                const cor = lucro >= 0 ? "text-green-400" : "text-red-500";
                const saldoFormatado = conta.saldo.toLocaleString('pt-BR', { minimumFractionDigits: 2 });

                grid.innerHTML += `
                    <div class="bg-gray-900 border border-gray-800 p-5 rounded-lg shadow-lg relative" data-id="${conta.id}">
                        <button onclick="removerConta(${conta.id})" class="absolute top-2 right-3 text-gray-600 hover:text-red-500 text-xs">✕</button>
                        
                        <h3 class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mb-4">${conta.nome}</h3>
                        
                        <div class="mb-6">
                            <label class="block text-[9px] text-gray-500 uppercase mb-1">Saldo Atual</label>
                            <input type="text" 
                                value="R$ ${saldoFormatado}"
                                oninput="mascaraMoeda(event, ${conta.id})"
                                class="bg-transparent border-b border-gray-800 focus:border-blue-500 outline-none w-full text-2xl font-mono text-white pb-1">
                        </div>

                        <div class="flex justify-between border-t border-gray-800 pt-4">
                            <div>
                                <p class="text-[9px] text-gray-500 uppercase">Lucro do Mês</p>
                                <p class="lucro-val text-xl font-mono ${cor}">R$ ${lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] text-gray-500 uppercase">Rendimento</p>
                                <p class="roi-val text-xl font-mono ${cor}">${roi.toFixed(2)}%</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        renderizar();
    </script>
</body>
</html>
