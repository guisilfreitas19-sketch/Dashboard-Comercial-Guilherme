<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Comercial | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #10b981; /* Verde esmeralda */
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        header {
            margin-bottom: 32px;
            text-align: left;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
        }

        /* GRID DE INDICADORES */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .kpi-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .kpi-value {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 8px;
            color: var(--text-main);
        }

        /* ÁREA DE ENTRADA */
        .main-panel {
            background: var(--card);
            padding: 32px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.04);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .input-group {
            display: flex;
            align-items: center;
            background: var(--accent);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 12px 16px;
            transition: all 0.2s;
        }

        .input-group:focus-within {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .prefix {
            margin-right: 8px;
            font-weight: 600;
            color: var(--text-muted);
        }

        input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
        }

        /* PROGRESSO */
        .progress-container {
            margin: 30px 0;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .progress-bg {
            height: 12px;
            background: var(--accent);
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #10b981, #34d399);
            border-radius: 100px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .summary {
            display: flex;
            gap: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .summary-item span {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .summary-item strong {
            font-size: 1.4rem;
            color: var(--text-main);
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .summary { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Dashboard Comercial</h1>
    </header>

    <div class="grid">
        <div class="card">
            <div class="kpi-label">Meta Mensal</div>
            <div class="kpi-value" id="disp-meta">R$ 9.000,00</div>
        </div>
        <div class="card">
            <div class="kpi-label">Base Guilherme</div>
            <div class="kpi-value" id="disp-g">R$ 0,00</div>
        </div>
        <div class="card">
            <div class="kpi-label">Total c/ Bônus</div>
            <div class="kpi-value" style="color: var(--primary)" id="disp-total">R$ 0,00</div>
        </div>
    </div>

    <div class="main-panel">
        <div class="form-grid">
            <div class="field">
                <label>Venda Guilherme</label>
                <div class="input-group">
                    <span class="prefix">R$</span>
                    <input type="text" id="in-g" placeholder="0,00">
                </div>
            </div>
            <div class="field">
                <label>Venda MED</label>
                <div class="input-group">
                    <span class="prefix">R$</span>
                    <input type="text" id="in-m" placeholder="0,00">
                </div>
            </div>
            <div class="field">
                <label>Venda ECOS</label>
                <div class="input-group">
                    <span class="prefix">R$</span>
                    <input type="text" id="in-e" placeholder="0,00">
                </div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-info">
                <span>Progresso da Meta</span>
                <span id="pct-text">0%</span>
            </div>
            <div class="progress-bg">
                <div class="progress-bar" id="bar"></div>
            </div>
        </div>

        <div class="summary">
            <div class="summary-item">
                <span>Faltam para o objetivo</span>
                <strong id="disp-falta">R$ 9.000,00</strong>
            </div>
            <div class="summary-item">
                <span>Bônus Gerado (15%)</span>
                <strong id="disp-bonus">R$ 0,00</strong>
            </div>
        </div>
    </div>
</div>

<script>
    const META = 9000;

    const inputs = {
        g: document.getElementById('in-g'),
        m: document.getElementById('in-m'),
        e: document.getElementById('in-e')
    };

    const displays = {
        g: document.getElementById('disp-g'),
        total: document.getElementById('disp-total'),
        falta: document.getElementById('disp-falta'),
        bonus: document.getElementById('disp-bonus'),
        bar: document.getElementById('bar'),
        pct: document.getElementById('pct-text')
    };

    function formatMoeda(valor) {
        return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function parseValor(str) {
        return Number(str.replace(/\./g, '').replace(',', '.')) || 0;
    }

    function aplicarMascara(ev) {
        let input = ev.target;
        let v = input.value.replace(/\D/g, '');
        if (!v) { input.value = ''; return; }
        
        v = (v / 100).toFixed(2).replace('.', ',');
        v = v.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        input.value = v;
        
        atualizarCalculos();
    }

    function atualizarCalculos() {
        const valG = parseValor(inputs.g.value);
        const valM = parseValor(inputs.m.value);
        const valE = parseValor(inputs.e.value);

        const bonus = (valM + valE) * 0.15;
        const totalGeral = valG + bonus;
        const falta = Math.max(META - totalGeral, 0);
        const porcentagem = Math.min((totalGeral / META) * 100, 100);

        // Atualiza Displays
        displays.g.innerText = formatMoeda(valG);
        displays.total.innerText = formatMoeda(totalGeral);
        displays.falta.innerText = formatMoeda(falta);
        displays.bonus.innerText = formatMoeda(bonus);
        
        // Atualiza Barra
        displays.bar.style.width = `${porcentagem}%`;
        displays.pct.innerText = `${porcentagem.toFixed(1)}%`;
    }

    // Event Listeners
    Object.values(inputs).forEach(input => {
        input.addEventListener('input', aplicarMascara);
    });
</script>

</body>
</html>
