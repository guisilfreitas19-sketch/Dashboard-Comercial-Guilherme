<div class="mt-6">
    <div class="w-full bg-gray-800 rounded-full h-1.5 mb-1">
        <div id="barraProgresso" class="bg-blue-500 h-1.5 rounded-full transition-all duration-500" style="width: 50%"></div>
    </div>
    <p id="statusMensagem" class="text-[9px] uppercase tracking-widest text-gray-500 text-center">Banca em Equilíbrio</p>
</div>

<script>
    function atualizarBarra(lucro) {
        const barra = document.getElementById('barraProgresso');
        const msg = document.getElementById('statusMensagem');
        
        if (lucro > 0) {
            barra.style.width = "100%";
            barra.className = "bg-green-500 h-1.5 rounded-full shadow-[0_0_10px_#22c55e]";
            msg.innerText = "Lucro Confirmado";
        } else if (lucro < 0) {
            barra.style.width = "30%";
            barra.className = "bg-red-500 h-1.5 rounded-full";
            msg.innerText = "Abaixo da Banca Inicial";
        } else {
            barra.style.width = "50%";
            barra.className = "bg-blue-500 h-1.5 rounded-full";
            msg.innerText = "Ponto de Equilíbrio";
        }
    }
    // Chame atualizarBarra(lucro) dentro da sua função calcular()
</script>
