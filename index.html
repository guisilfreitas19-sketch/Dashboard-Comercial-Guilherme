<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saldo do Dia</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center h-screen font-sans">

    <div class="w-full max-w-md p-6 bg-gray-900 rounded-lg border border-gray-800 shadow-2xl text-center">
        <h2 class="text-gray-500 uppercase text-xs tracking-widest mb-2">Banca Inicial: R$ 5.000,00</h2>
        
        <div class="mb-8">
            <label class="block text-sm text-gray-400 mb-2 italic">Insira o saldo atual da conta:</label>
            <input type="number" id="saldoInput" step="0.01" placeholder="0,00"
                class="bg-transparent text-5xl font-mono text-center w-full focus:outline-none border-b border-gray-700 pb-2 text-blue-400">
        </div>

        <hr class="border-gray-800 mb-8">

        <div class="grid grid-cols-2 gap-4">
            <div class="text-left">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Lucro/Prejuízo</p>
                <p id="lucroFinal" class="text-2xl font-mono tracking-tighter">R$ 0,00</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Rendimento</p>
                <p id="roi" class="text-2xl font-mono tracking-tighter">0%</p>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('saldoInput');
        const lucroTxt = document.getElementById('lucroFinal');
        const roiTxt = document.getElementById('roi');
        const BANCA_INICIAL = 5000;

        // Carregar dado salvo ao abrir
        window.onload = () => {
            const salvo = localStorage.getItem('ultimoSaldo');
            if (salvo) {
                input.value = salvo;
                atualizar();
            }
        };

        function atualizar() {
            const valor = parseFloat(input.value) || 0;
            const lucro = valor - BANCA_INICIAL;
            const roi = (lucro / BANCA_INICIAL) * 100;

            // Atualiza Textos
            lucroTxt.innerText = `R$ ${lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            roiTxt.innerText = `${roi.toFixed(2)}%`;

            // Cores Dinâmicas
            lucroTxt.className = lucro >= 0 ? "text-2xl font-mono text-green-500" : "text-2xl font-mono text-red-500";
            roiTxt.className = lucro >= 0 ? "text-2xl font-mono text-green-500" : "text-2xl font-mono text-red-500";

            // Salva no Navegador
            localStorage.setItem('ultimoSaldo', input.value);
        }

        input.addEventListener('input', atualizar);
    </script>
</body>
</html>
